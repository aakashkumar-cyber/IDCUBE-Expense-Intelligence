  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: 700; color: #E8EDF4; margin-top: 3px;\">{{ companyTotal }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n          <sc-for list=\"{{ companySegs }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ s.onClick }}\" style=\"cursor: pointer; display: flex; align-items: center; gap: 10px;\">\n              <span style=\"width: 11px; height: 11px; border-radius: 3px; background: {{ s.color }}; flex-shrink: 0;\"><\u002Fspan>\n              <span style=\"font-size: 12.5px; font-weight: 500; color: {{ s.nameColor }}; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ s.short }}<\u002Fspan>\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #8B97A7;\">{{ s.pctLabel }}<\u002Fspan>\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: {{ s.valColor }}; min-width: 76px; text-align: right;\">{{ s.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"padding: 22px 24px; border-radius: 18px; background: rgba(40,51,68,0.66); border: 1px solid rgba(255,255,255,0.07); opacity: {{ enterOp }}; transform: {{ enterY }}; transition: opacity .6s ease .36s, transform .6s ease .36s;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;\">\n          <div>\n            <div style=\"font-size: 14.5px; font-weight: 600;\">Daily Spend Calendar<\u002Fdiv>\n            <div style=\"font-size: 11.5px; color: #6b7686; margin-top: 3px;\">Date-wise intensity · hover for detail · click a day to filter<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: #6b7686;\">\n            <span>Low<\u002Fspan>\n            <sc-for list=\"{{ heatLegend }}\" as=\"lg\" hint-placeholder-count=\"5\">\n              <span style=\"width: 12px; height: 12px; border-radius: 3px; background: {{ lg.bg }};\"><\u002Fspan>\n            <\u002Fsc-for>\n            <span>High<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 4px; overflow-x: auto;\">\n          <sc-for list=\"{{ heatRows }}\" as=\"row\" hint-placeholder-count=\"12\">\n            <div style=\"display: flex; align-items: center; gap: 4px;\">\n              <span style=\"width: 46px; flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: #6b7686;\">{{ row.mo }}<\u002Fspan>\n              <div style=\"display: flex; gap: 3px; flex: 1;\">\n                <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"31\">\n                  <div title=\"{{ c.tip }}\" onclick=\"{{ c.onClick }}\" style=\"flex: 1; aspect-ratio: 1; min-width: 7px; border-radius: 2.5px; background: {{ c.bg }}; cursor: {{ c.cursor }}; box-shadow: {{ c.ring }}; transition: transform .15s, box-shadow .2s;\"><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display: flex; gap: 3px; margin-top: 2px; padding-left: 50px;\">\n            <sc-for list=\"{{ dayTicks }}\" as=\"t\" hint-placeholder-count=\"31\">\n              <div style=\"flex: 1; text-align: center; font-size: 8px; color: #4a5260; font-family: 'IBM Plex Mono', monospace;\">{{ t.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- TOP PARTNERS -->\n    <section style=\"margin-top: 16px; padding: 22px 24px; border-radius: 18px; background: rgba(40,51,68,0.66); border: 1px solid rgba(255,255,255,0.07); opacity: {{ enterOp }}; transform: {{ enterY }}; transition: opacity .6s ease .42s, transform .6s ease .42s;\">\n      <div style=\"display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;\">\n        <div>\n          <div style=\"font-size: 14.5px; font-weight: 600;\">Top Partners<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #6b7686; margin-top: 3px;\">Vendors &amp; people by spend · <span style=\"color: var(--ac); font-weight: 600;\">click any partner to view raw transactions<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6b7686;\">{{ partnerCount }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 9px 26px;\">\n        <sc-for list=\"{{ partnerRows }}\" as=\"p\" hint-placeholder-count=\"10\">\n          <div onclick=\"{{ p.onClick }}\" style=\"cursor: pointer; display: flex; align-items: center; gap: 13px; padding: 9px 12px; border-radius: 11px; background: {{ p.rowBg }}; border: 1px solid {{ p.rowBorder }}; transition: background .2s, border-color .2s;\">\n            <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: #5C6675; width: 22px; flex-shrink: 0;\">{{ p.rank }}<\u002Fspan>\n            <div style=\"flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px;\">\n              <div style=\"display: flex; justify-content: space-between; gap: 10px; align-items: baseline;\">\n                <span style=\"font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; font-weight: 600; color: {{ p.valColor }}; flex-shrink: 0;\">{{ p.label }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height: 6px; border-radius: 4px; background: rgba(255,255,255,0.05); overflow: hidden;\">\n                <div style=\"height: 100%; border-radius: 4px; width: {{ p.w }}%; background: {{ p.bg }}; transition: width .85s cubic-bezier(.22,1,.36,1);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; width: 56px;\">\n              <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #cdd5e0;\">{{ p.txns }}<\u002Fspan>\n              <span style=\"font-size: 9.5px; color: #5C6675; letter-spacing: .04em;\">txns<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"color: #4a5260; font-size: 16px; flex-shrink: 0;\">›<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER -->\n    <footer style=\"margin-top: 26px; display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: space-between; align-items: center; font-size: 11px; color: #4f5867;\">\n      <span>Source · Analytic Line export (India · Dubai · USA) · {{ totalTxns }} journal lines<\u002Fspan>\n      <span>Expenses shown as positive net cost; credits &amp; gains net negative · figures in entity currency<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n  <!-- DRILL-DOWN MODAL -->\n  <sc-if value=\"{{ drillOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDrill }}\" style=\"position: fixed; inset: 0; z-index: 50; background: rgba(6,8,11,0.74); backdrop-filter: blur(4px); animation: idcBackdrop .25s ease both; display: flex; align-items: flex-start; justify-content: center; padding: clamp(16px, 5vh, 70px) 16px 24px;\">\n      <div onclick=\"{{ stop }}\" style=\"width: min(940px, 100%); max-height: 86vh; display: flex; flex-direction: column; background: #1a212d; border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; box-shadow: 0 30px 80px rgba(0,0,0,.6); animation: idcModalIn .32s cubic-bezier(.22,1,.36,1) both; overflow: hidden;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 22px 24px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); background: {{ acSoft }};\">\n          <div style=\"min-width: 0;\">\n            <div style=\"font-size: 10.5px; font-weight: 600; letter-spacing: .2em; color: var(--ac); text-transform: uppercase;\">Partner Detail · {{ region }}<\u002Fdiv>\n            <div style=\"font-size: 21px; font-weight: 700; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ drill.name }}<\u002Fdiv>\n            <div style=\"display: flex; gap: 20px; margin-top: 12px;\">\n              <div>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: {{ drill.totalColor }};\">{{ drill.total }}<\u002Fdiv>\n                <div style=\"font-size: 10.5px; color: #6b7686; margin-top: 2px;\">Net expense<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: #cdd5e0;\">{{ drill.count }}<\u002Fdiv>\n                <div style=\"font-size: 10.5px; color: #6b7686; margin-top: 2px;\">Transactions<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: #cdd5e0;\">{{ drill.span }}<\u002Fdiv>\n                <div style=\"font-size: 10.5px; color: #6b7686; margin-top: 2px;\">Active months<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeDrill }}\" style=\"flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #cdd5e0; font-size: 18px; cursor: pointer; line-height: 1;\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow: auto; flex: 1;\">\n          <sc-for list=\"{{ drillRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n                <\u002Fsc-for><table style=\"width: 100%; border-collapse: collapse; font-size: 12.5px;\">\n            <thead>\n              <tr style=\"position: sticky; top: 0; background: #222b3a; z-index: 1;\">\n                <th style=\"text-align: left; padding: 11px 16px; font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #7d8a9a; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08);\">Date<\u002Fth>\n                <th style=\"text-align: left; padding: 11px 12px; font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #7d8a9a; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08);\">Ref.<\u002Fth>\n                <th style=\"text-align: left; padding: 11px 12px; font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #7d8a9a; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08);\">Cost Center<\u002Fth>\n                <th style=\"text-align: left; padding: 11px 12px; font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #7d8a9a; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08);\">Expense Name<\u002Fth>\n                <th style=\"text-align: right; padding: 11px 16px; font-size: 10px; font-weight: 600; letter-spacing: .12em; color: #7d8a9a; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08);\">Amount<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"border-bottom: 1px solid rgba(255,255,255,0.045); background: {{ r.zebra }};\">\n                  <td style=\"padding: 11px 16px; white-space: nowrap; vertical-align: top;\">\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #aab4c2;\">{{ r.date }}<\u002Fdiv>\n                    <div style=\"font-size: 10px; color: {{ r.regColor }}; margin-top: 3px; font-weight: 600; letter-spacing: .04em;\">{{ r.reg }}<\u002Fdiv>\n                  <\u002Ftd>\n                  <td style=\"padding: 11px 12px; font-family: 'IBM Plex Mono', monospace; vertical-align: top; max-width: 190px;\">\n                    <div style=\"font-size: 11px; color: #aab4c2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ r.ref }}<\u002Fdiv>\n                    <div title=\"{{ r.refSub }}\" style=\"font-family: 'IBM Plex Sans', sans-serif; font-size: 10.5px; color: #5C6675; margin-top: 2px; max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ r.refSub }}<\u002Fdiv>\n                  <\u002Ftd>\n                  <td style=\"padding: 11px 12px; color: #aab4c2; vertical-align: top; white-space: nowrap;\">{{ r.cc }}<\u002Ftd>\n                  <td style=\"padding: 11px 12px; vertical-align: top;\">\n                    <div style=\"font-weight: 500; color: #E8EDF4;\">{{ r.en }}<\u002Fdiv>\n                  <\u002Ftd>\n                  <td style=\"padding: 11px 16px; text-align: right; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; font-weight: 600; vertical-align: top; color: {{ r.amtColor }};\">{{ r.amt }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div style=\"padding: 12px 24px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #5C6675; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;\">\n          <span>{{ drill.filterNote }}<\u002Fspan>\n          <span>Columns: Date · Ref. (voucher) · Cost Center · Expense Name · Amount<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    region: 'Consolidated',\n    filters: { month: null, date: null, dept: null, company: null, expense: null },\n    drill: null,\n    mounted: false,\n    data: null,\n    kpi: { total: 0, txns: 0, avgMonth: 0, partners: 0, peakVal: 0, topVal: 0 },\n  };\n\n  componentDidMount() {\n    const tryLoad = (n) => {\n      if (window.IDCUBE_DATA) {\n        this.setState({ data: window.IDCUBE_DATA });\n      } else if (n > 0) {\n        setTimeout(() => tryLoad(n - 1), 60);\n      }\n    };\n    tryLoad(50);\n  }\n\n  startTween() {\n    const agg = this._agg || (this.state.data ? this.computeAgg() : null);\n    if (agg) this._tween(agg.kpiTargets);\n  }\n\n  // ---------- helpers ----------\n  accentHex() { return { Consolidated: '#A78BFA', India: '#F5B43B', Dubai: '#2FD0BE', USA: '#5B9DFF' }[this.state.region]; }\n  regionColor(rg) { return { India: '#F5B43B', Dubai: '#2FD0BE', USA: '#5B9DFF' }[rg] || '#8B97A7'; }\n\n  // FY-25/26 closing FX rates supplied by Finance: 1 AED = 24.098 INR, 1 USD = 89.4593 INR.\n  getRegion() {\n    if (this.state.region === 'Consolidated') return this.buildConsolidated();\n    return this.state.data.regions[this.state.region];\n  }\n  buildConsolidated() {\n    if (this._consol) return this._consol;\n    const RATE = { India: 1, Dubai: 24.098, USA: 89.4593 };\n    const d = this.state.data.regions;\n    const recs = [];\n    ['India', 'Dubai', 'USA'].forEach((rg) => {\n      const rate = RATE[rg];\n      d[rg].records.forEach((r) => {\n        recs.push({ ...r, am: Math.round(r.am * rate * 100) / 100, rg });\n      });\n    });\n    this._consol = { currency: 'INR', symbol: '\\u20B9', locale: 'en-IN', system: 'india', records: recs, consolidated: true };\n    return this._consol;\n  }\n  hexToRgb(h) { const n = parseInt(h.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }\n  rgba(h, a) { const [r, g, b] = this.hexToRgb(h); return `rgba(${r},${g},${b},${a})`; }\n\n  fmtC(v, reg) {\n    const neg = v < 0; const a = Math.abs(v); let s;\n    if (reg.system === 'india') {\n      if (a >= 1e7) s = (a / 1e7).toFixed(2) + ' Cr';\n      else if (a >= 1e5) s = (a / 1e5).toFixed(2) + ' L';\n      else s = Math.round(a).toLocaleString('en-IN');\n    } else {\n      if (a >= 1e6) s = (a / 1e6).toFixed(2) + 'M';\n      else if (a >= 1e3) s = (a / 1e3).toFixed(1) + 'K';\n      else s = Math.round(a).toLocaleString('en-US');\n    }\n    const sym = reg.symbol; const pre = sym.length > 1 ? sym + ' ' : sym;\n    return (neg ? '\\u2212' : '') + pre + s;\n  }\n  fmtFull(v, reg) {\n    const neg = v < 0; const a = Math.abs(v);\n    const s = a.toLocaleString(reg.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n    const sym = reg.symbol; const pre = sym.length > 1 ? sym + ' ' : sym;\n    return (neg ? '\\u2212' : '') + pre + s;\n  }\n  fmtInt(v, reg) { return Math.round(v).toLocaleString(reg.locale); }\n\n  isoFor(label, day) {\n    const [mon, yy] = label.split('-');\n    const mi = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 }[mon];\n    const year = 2000 + parseInt(yy);\n    const dim = new Date(year, mi + 1, 0).getDate();\n    if (day > dim) return null;\n    return year + '-' + String(mi + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');\n  }\n  niceDate(iso) {\n    const [y, m, d] = iso.split('-');\n    const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m) - 1];\n    return parseInt(d) + ' ' + mn + ' ' + y;\n  }\n  shortCompany(name) {\n    const parts = name.split(' - ');\n    if (parts.length > 1) return parts[parts.length - 1].trim();\n    return name.replace('IDCUBE ', '').trim();\n  }\n\n  // ---------- actions ----------\n  setRegion(r) {\n    if (r === this.state.region) return;\n    this.setState({ region: r, filters: { month: null, date: null, dept: null, company: null, expense: null }, drill: null }, () => this.startTween());\n  }\n  toggleFilter(kind, val) {\n    const f = { ...this.state.filters };\n    f[kind] = f[kind] === val ? null : val;\n    this.setState({ filters: f }, () => this.startTween());\n  }\n  clearAll() {\n    this.setState({ filters: { month: null, date: null, dept: null, company: null, expense: null } }, () => this.startTween());\n  }\n  openDrill(name) { this.setState({ drill: name }); }\n  closeDrill() { this.setState({ drill: null }); }\n\n  _tween(targets) {\n    cancelAnimationFrame(this._raf);\n    clearTimeout(this._snapT);\n    const from = { ...this.state.kpi };\n    const keys = ['total', 'txns', 'avgMonth', 'partners', 'peakVal', 'topVal'];\n    const start = performance.now(); const dur = 950;\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur); const e = ease(t);\n      const cur = {};\n      keys.forEach((k) => { cur[k] = (from[k] || 0) + (targets[k] - (from[k] || 0)) * e; });\n      this.setState({ kpi: cur });\n      if (t < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n    // Safety net: timers fire even when rAF is throttled (background/unpainted tab),\n    // guaranteeing the final figures always land.\n    this._snapT = setTimeout(() => this.setState({ kpi: { ...targets } }), 1400);\n  }\n\n  // ---------- aggregation ----------\n  computeAgg() {\n    const data = this.state.data;\n    const reg = this.getRegion();\n    const recs = reg.records;\n    const f = this.state.filters;\n    const FY = data.fyMonths;\n    const passes = (r, skip) => {\n      if (!skip.includes('month') && f.month && r.mo !== f.month) return false;\n      if (!skip.includes('date') && f.date && r.d !== f.date) return false;\n      if (!skip.includes('dept') && f.dept && r.cc !== f.dept) return false;\n      if (!skip.includes('company') && f.company && r.co !== f.company) return false;\n      if (!skip.includes('expense') && f.expense && r.en !== f.expense) return false;\n      return true;\n    };\n    const full = recs.filter((r) => passes(r, []));\n\n    const total = full.reduce((s, r) => s + r.am, 0);\n    const txns = full.length;\n    const partners = new Set(full.map((r) => r.pt)).size;\n    const monthsPresent = new Set(full.map((r) => r.mo)).size || 1;\n    const avgMonth = total / monthsPresent;\n\n    // month\n    const mset = recs.filter((r) => passes(r, ['month', 'date']));\n    const mMap = new Map(); FY.forEach((m) => mMap.set(m, 0));\n    mset.forEach((r) => { if (mMap.has(r.mo)) mMap.set(r.mo, mMap.get(r.mo) + r.am); });\n    const monthVals = FY.map((m) => ({ mo: m, val: mMap.get(m) }));\n    const monthMax = Math.max(1, ...monthVals.map((o) => Math.abs(o.val)));\n    let peak = { mo: '\\u2014', val: 0 };\n    monthVals.forEach((o) => { if (o.val > peak.val) peak = { mo: o.mo, val: o.val }; });\n\n    // dept\n    const dset = recs.filter((r) => passes(r, ['dept']));\n    const dMap = new Map(); dset.forEach((r) => dMap.set(r.cc, (dMap.get(r.cc) || 0) + r.am));\n    const depts = [...dMap].map(([name, val]) => ({ name, val })).sort((a, b) => b.val - a.val);\n    const deptMax = Math.max(1, ...depts.map((o) => Math.abs(o.val)));\n\n    // expense\n    const eset = recs.filter((r) => passes(r, ['expense']));\n    const eMap = new Map(); eset.forEach((r) => eMap.set(r.en, (eMap.get(r.en) || 0) + r.am));\n    const exps = [...eMap].map(([name, val]) => ({ name, val })).sort((a, b) => b.val - a.val);\n    const expMax = Math.max(1, ...exps.map((o) => Math.abs(o.val)));\n\n    // company\n    const cset = recs.filter((r) => passes(r, ['company']));\n    const cMap = new Map(); cset.forEach((r) => cMap.set(r.co, (cMap.get(r.co) || 0) + r.am));\n    const comps = [...cMap].map(([name, val]) => ({ name, val: Math.max(0, val) })).filter((o) => o.val > 0).sort((a, b) => b.val - a.val);\n    const cTotal = comps.reduce((s, o) => s + o.val, 0) || 1;\n\n    // partners\n    const pMap = new Map(); const pTx = new Map();\n    full.forEach((r) => { pMap.set(r.pt, (pMap.get(r.pt) || 0) + r.am); pTx.set(r.pt, (pTx.get(r.pt) || 0) + 1); });\n    let parts = [...pMap].map(([name, val]) => ({ name, val, txns: pTx.get(name) })).sort((a, b) => b.val - a.val);\n    const partTotal = parts.length;\n    parts = parts.slice(0, 20);\n    const partMax = Math.max(1, ...parts.map((o) => Math.abs(o.val)));\n\n    // heatmap\n    const hset = recs.filter((r) => passes(r, ['month', 'date']));\n    const dayMap = new Map(); hset.forEach((r) => dayMap.set(r.d, (dayMap.get(r.d) || 0) + r.am));\n    let dmax = 1; dayMap.forEach((v) => { if (v > dmax) dmax = v; });\n\n    const topCat = exps.length ? exps[0] : { name: '\\u2014', val: 0 };\n    return {\n      reg, FY, full, total, txns, partners, monthsPresent, avgMonth,\n      monthVals, monthMax, peakName: peak.mo, peakVal: peak.val,\n      depts, deptMax, exps, expMax, comps, cTotal,\n      parts, partTotal, partMax, dayMap, dmax,\n      topName: topCat.name, topVal: topCat.val,\n      kpiTargets: { total, txns, avgMonth, partners, peakVal: peak.val, topVal: topCat.val },\n    };\n  }\n\n  renderVals() {\n    const data = this.state.data;\n    const ac = this.accentHex();\n    const acSoft = this.rgba(ac, 0.13);\n    const acBorder = this.rgba(ac, 0.32);\n    const glow = this.rgba(ac, 0.30);\n    const glow2 = this.rgba(ac, 0.16);\n    const base = {\n      ac, acSoft, acBorder, glow, glow2,\n      enterOp: 1,\n      enterY: 'translateY(0)',\n      region: this.state.region,\n      isConsolidated: this.state.region === 'Consolidated',\n      regionTabs: ['Consolidated', 'India', 'Dubai', 'USA'].map((id) => {\n        const active = id === this.state.region;\n        const curMap = { Consolidated: 'ALL \\u00B7 \\u20B9', India: '\\u20B9 INR', Dubai: 'AED', USA: '$ USD' };\n        return { id, cur: curMap[id], active, onSelect: () => this.setRegion(id),\n          bg: active ? 'var(--ac)' : 'transparent', color: active ? '#15110a' : '#8B97A7' };\n      }),\n    };\n\n    if (!data) {\n      return { ...base, ready: false, filterLabel: 'Loading\\u2026', chips: [], hasFilters: false,\n        kpis: [], gridLines: [], monthBars: [], deptBars: [], expBars: [], companySegs: [],\n        heatRows: [], heatLegend: [], dayTicks: [], partnerRows: [], curLabel: '', companyTotal: '',\n        deptCount: '', expCount: '', partnerCount: '', totalTxns: '', drillOpen: false,\n        clearAll: () => {}, closeDrill: () => {}, stop: () => {} };\n    }\n\n    const reg = this.getRegion();\n    const key = this.state.region + '|' + JSON.stringify(this.state.filters);\n    if (this._key !== key || this._aggRegion !== this.state.data) {\n      this._key = key; this._aggRegion = this.state.data;\n      this._agg = this.computeAgg();\n    }\n    const agg = this._agg;\n    const M = 1;\n\n    // Fire the KPI count-up once, the first render data is available — independent of\n    // componentDidMount timing (covers fresh load, async data, and hot-reload).\n    if (!this._initTriggered) {\n      this._initTriggered = true;\n      setTimeout(() => this.startTween(), 40);\n    }\n    const k = this.state.kpi;\n\n    // chips\n    const f = this.state.filters;\n    const chipDefs = [\n      { kind: 'month', label: 'Month', val: f.month },\n      { kind: 'date', label: 'Date', val: f.date ? this.niceDate(f.date) : null, raw: f.date },\n      { kind: 'dept', label: 'Dept', val: f.dept },\n      { kind: 'company', label: 'Company', val: f.company ? this.shortCompany(f.company) : null, raw: f.company },\n      { kind: 'expense', label: 'Expense', val: f.expense },\n    ];\n    const chips = chipDefs.filter((c) => c.val).map((c) => ({\n      kindLabel: c.label, valLabel: c.val,\n      onClear: () => this.toggleFilter(c.kind, c.raw != null ? c.raw : c.val),\n    }));\n    const hasFilters = chips.length > 0;\n\n    // KPIs\n    const kpiCard = (label, value, sub, opts = {}) => ({\n      label, value, sub,\n      size: opts.size || '26px',\n      valColor: opts.valColor || '#E8EDF4',\n      cardBg: opts.hero ? `linear-gradient(150deg, ${this.rgba(ac, 0.18)}, rgba(40,51,68,0.5))` : 'rgba(40,51,68,0.6)',\n      cardBorder: opts.hero ? acBorder : 'rgba(255,255,255,0.07)',\n      accentBar: opts.hero ? 'var(--ac)' : 'transparent',\n      delay: opts.delay,\n    });\n    const kpis = [\n      kpiCard('Total Expense', this.fmtC(k.total, reg), reg.currency + ' \\u00B7 net booked', { hero: true, size: '29px', valColor: ac, delay: '0s' }),\n      kpiCard('Transactions', this.fmtInt(k.txns, reg), 'journal lines', { delay: '.05s' }),\n      kpiCard('Avg / Month', this.fmtC(k.avgMonth, reg), agg.monthsPresent + ' active month' + (agg.monthsPresent > 1 ? 's' : ''), { delay: '.1s' }),\n      kpiCard('Active Partners', this.fmtInt(k.partners, reg), 'vendors & people', { delay: '.15s' }),\n      kpiCard('Peak Month', agg.peakName, this.fmtC(agg.peakVal, reg), { size: '22px', delay: '.2s' }),\n      kpiCard('Top Category', agg.topName, this.fmtC(agg.topVal, reg), { size: agg.topName.length > 14 ? '15px' : '19px', delay: '.25s' }),\n    ];\n\n    // gridlines\n    const gridLines = [0, 25, 50, 75, 100].map((p) => ({ pos: 'calc(' + p + '% )' }));\n\n    // month bars\n    const monthBars = agg.monthVals.map((o) => {\n      const active = f.month === o.mo;\n      const dim = (f.month && !active) ? 0.4 : 1;\n      const pct = Math.max(0, o.val) / agg.monthMax * 100;\n      return {\n        mo: o.mo, tick: o.mo.split('-')[0], label: this.fmtC(o.val, reg),\n        h: (pct * M).toFixed(2), op: dim,\n        bg: active ? `linear-gradient(180deg, ${this.rgba(ac, 1)}, ${this.rgba(ac, 0.75)})`\n          : `linear-gradient(180deg, ${this.rgba(ac, 0.85)}, ${this.rgba(ac, 0.32)})`,\n        shadow: active ? `0 0 22px ${this.rgba(ac, 0.5)}` : 'none',\n        labelColor: active ? ac : '#8B97A7',\n        tickColor: active ? '#E8EDF4' : '#6b7686',\n        onClick: () => this.toggleFilter('month', o.mo),\n      };\n    });\n\n    // dept / expense bars\n    const barRow = (o, max, filterKind, activeVal) => {\n      const active = activeVal === o.name;\n      const neg = o.val < 0;\n      const pct = Math.max(0, o.val) / max * 100;\n      const col = neg ? '#4ADE80' : ac;\n      return {\n        name: o.name, label: this.fmtC(o.val, reg),\n        w: (pct * M).toFixed(2),\n        bg: `linear-gradient(90deg, ${this.rgba(col, active ? 1 : 0.92)}, ${this.rgba(col, 0.4)})`,\n        nameColor: active ? '#fff' : '#cdd5e0',\n        valColor: neg ? '#4ADE80' : (active ? ac : '#aab4c2'),\n        onClick: () => this.toggleFilter(filterKind, o.name),\n      };\n    };\n    const deptBars = agg.depts.map((o) => barRow(o, agg.deptMax, 'dept', f.dept));\n    const expBars = agg.exps.map((o) => barRow(o, agg.expMax, 'expense', f.expense));\n\n    // company donut\n    const palette = ['#F5B43B', '#5B9DFF', '#2FD0BE', '#A78BFA', '#FB7185', '#4ADE80', '#38BDF8', '#FBBF24'];\n    const C = 2 * Math.PI * 70;\n    let accFrac = 0;\n    const companySegs = agg.comps.map((o, i) => {\n      const frac = o.val / agg.cTotal;\n      const len = frac * C; const off = accFrac * C; accFrac += frac;\n      const active = f.company === o.name;\n      return {\n        name: o.name, short: this.shortCompany(o.name), label: this.fmtC(o.val, reg),\n        pctLabel: (frac * 100).toFixed(1) + '%',\n        color: palette[i % palette.length],\n        dash: (len * M).toFixed(2) + ' ' + C.toFixed(2),\n        off: (-off).toFixed(2),\n        op: (f.company && !active) ? 0.4 : 1,\n        nameColor: active ? '#fff' : '#cdd5e0',\n        valColor: active ? '#fff' : '#aab4c2',\n        onClick: () => this.toggleFilter('company', o.name),\n      };\n    });\n    const companyTotal = this.fmtC(agg.comps.reduce((s, o) => s + o.val, 0), reg);\n\n    // heat legend + ticks\n    const heatLevelBg = (lvl) => lvl === 0 ? 'rgba(255,255,255,0.045)' : this.rgba(ac, [0, 0.22, 0.42, 0.66, 0.95][lvl]);\n    const heatLegend = [1, 2, 3, 4].map((l) => ({ bg: heatLevelBg(l) }));\n    const dayTicks = Array.from({ length: 31 }, (_, i) => ({ label: (i + 1) % 5 === 0 || i === 0 ? (i + 1) : '' }));\n\n    const heatRows = agg.FY.map((m) => {\n      const cells = [];\n      for (let day = 1; day <= 31; day++) {\n        const iso = this.isoFor(m, day);\n        const has = iso && agg.dayMap.has(iso);\n        const val = has ? agg.dayMap.get(iso) : 0;\n        const lvl = has ? (val <= 0 ? 0 : Math.min(4, 1 + Math.floor(val / agg.dmax * 3.999))) : 0;\n        const active = f.date === iso;\n        cells.push({\n          tip: iso ? (this.niceDate(iso) + ' \\u00B7 ' + (has ? this.fmtC(val, reg) : 'no expense')) : '',\n          bg: !iso ? 'transparent' : (active ? ac : heatLevelBg(lvl)),\n          cursor: has ? 'pointer' : 'default',\n          ring: active ? `0 0 0 2px ${this.rgba(ac, 0.5)}` : 'none',\n          onClick: () => { if (has) this.toggleFilter('date', iso); },\n        });\n      }\n      return { mo: m, cells };\n    });\n\n    // partners\n    const partnerRows = agg.parts.map((o, i) => {\n      const neg = o.val < 0;\n      const pct = Math.max(0, o.val) / agg.partMax * 100;\n      const col = neg ? '#4ADE80' : ac;\n      return {\n        rank: i + 1, name: o.name, txns: o.txns, label: this.fmtC(o.val, reg),\n        w: (pct * M).toFixed(2),\n        bg: `linear-gradient(90deg, ${this.rgba(col, 0.95)}, ${this.rgba(col, 0.4)})`,\n        valColor: neg ? '#4ADE80' : '#aab4c2',\n        rowBg: 'rgba(255,255,255,0.022)', rowBorder: 'rgba(255,255,255,0.05)',\n        onClick: () => this.openDrill(o.name),\n      };\n    });\n\n    // drill\n    let drill = { name: '', total: '', count: 0, span: 0, totalColor: '#fff', filterNote: '' };\n    let drillRows = [];\n    const drillOpen = !!this.state.drill;\n    if (drillOpen) {\n      const rows = agg.full.filter((r) => r.pt === this.state.drill).sort((a, b) => b.d.localeCompare(a.d));\n      const dtot = rows.reduce((s, r) => s + r.am, 0);\n      const months = new Set(rows.map((r) => r.mo)).size;\n      drill = {\n        name: this.state.drill,\n        total: this.fmtFull(dtot, reg),\n        totalColor: dtot < 0 ? '#4ADE80' : ac,\n        count: rows.length,\n        span: months,\n        filterNote: hasFilters ? 'Filtered view \\u00B7 ' + rows.length + ' matching transactions' : 'All FY 25\\u201326 transactions for this partner',\n      };\n      drillRows = rows.map((r, i) => {\n        const voucher = (r.jr || '').split(' (')[0].trim();\n        return {\n          date: this.niceDate(r.d),\n          reg: (this.state.region === 'Consolidated' && r.rg) ? r.rg : '',\n          regColor: this.regionColor(r.rg),\n          ref: voucher || r.rf || '\\u2014',\n          refSub: (r.rf && r.rf !== voucher) ? r.rf : '',\n          cc: r.cc,\n          en: r.en,\n          amt: this.fmtFull(r.am, reg),\n          amtColor: r.am < 0 ? '#4ADE80' : '#E8EDF4',\n          zebra: i % 2 ? 'rgba(255,255,255,0.018)' : 'transparent',\n        };\n      });\n    }\n\n    return {\n      ...base, ready: true,\n      filterLabel: hasFilters ? 'Filters' : 'No filters \\u2014 showing all',\n      chips, hasFilters, clearAll: () => this.clearAll(),\n      kpis, gridLines, monthBars, deptBars, expBars, companySegs, companyTotal,\n      heatRows, heatLegend, dayTicks, partnerRows,\n      curLabel: reg.currency,\n      deptCount: agg.depts.length + ' depts',\n      expCount: agg.exps.length + ' types',\n      partnerCount: 'Top ' + agg.parts.length + ' of ' + agg.partTotal,\n      totalTxns: (data.regions.India.records.length + data.regions.Dubai.records.length + data.regions.USA.records.length).toLocaleString('en-US'),\n      drill, drillRows, drillOpen, closeDrill: () => this.closeDrill(), stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
